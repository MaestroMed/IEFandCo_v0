name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          # No DB at build → content adapter falls back to static
          NODE_ENV: production

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm run test
